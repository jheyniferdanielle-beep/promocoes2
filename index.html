<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA CONFIG -->
  <title>Achadinhos da Gê</title>
  <meta name="theme-color" content="#25D366">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }
    .box { background:#fff; padding:20px; border-radius:10px; max-width:500px; margin:auto; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
    input, button { width:100%; margin-top:10px; padding:10px; border-radius:8px; border:1px solid #ccc; }
    button { background:#25D366; color:#fff; border:none; cursor:pointer; font-weight:bold; }
    .preview { margin-top:15px; background:#fafafa; padding:10px; border-radius:8px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🔥 Achadinhos da Gê</h2>

    <input type="text" id="nome" placeholder="Nome do produto">
    <input type="text" id="link" placeholder="Link do produto">
    <input type="text" id="precoAntigo" placeholder="Preço antigo">
    <input type="text" id="precoNovo" placeholder="Preço atual">

    <button onclick="gerarGrupo()">Gerar Promoção</button>

    <div class="preview" id="preview"></div>
  </div>

  <script>
    function gerarFrase(nome){
      nome = nome.toLowerCase();

      if(nome.includes('fralda') || nome.includes('lenço') || nome.includes('mamypoko') || nome.includes('pampers') || nome.includes('huggies')){
        return '👶 Mamães olha isso!! promoção maravilhosa pro bebê 😱';
      }
      if(nome.includes('cueca') || nome.includes('boxer')){
        return '🩲 Olha isso pros maridos 👀 vocês sabem que precisam 😂';
      }
      if(nome.includes('vestido') || nome.includes('bolsa')){
        return '👗 Meninas olha esse achado MARAVILHOSO 😍';
      }
      if(nome.includes('tenis') || nome.includes('sapato')){
        return '👟 Conforto e estilo com preço incrível!';
      }
      if(nome.includes('fone') || nome.includes('bluetooth')){
        return '🎧 Som top com preço baixíssimo!';
      }
      if(nome.includes('maquiagem') || nome.includes('perfume') || nome.includes('cosmetico')){
        return '💄 Meninas olha esse preço surreal!';
      }

      return '🔥 Gente olha isso!! preço baixíssimo!';
    }

    function gerarGrupo(){
      let nome = document.getElementById('nome').value;
      let link = document.getElementById('link').value;
      let precoAntigo = document.getElementById('precoAntigo').value;
      let precoNovo = document.getElementById('precoNovo').value;

      let frase = gerarFrase(nome);

      let mensagem = `🚨 ATENÇÃO GRUPO 🚨\n\n${frase}\n\n🛍️ ${nome}\n\n❌ De: ${precoAntigo}\n✅ HOJE: ${precoNovo}\n\n🔥 LINK:\n${link}\n\n⚡ Corre que acaba!`;

      document.getElementById('preview').innerHTML = `
        <p>${mensagem.replace(/\n/g, '<br>')}</p>
        <button onclick="copiarTexto()">Copiar</button>
      `;

      window.textoAtual = mensagem;
    }

    function copiarTexto(){
      let textarea = document.createElement('textarea');
      textarea.value = window.textoAtual;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('Copiado!');
    }

    // SERVICE WORKER
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
